<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业版仓库系统</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f172a;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}

.header{
  width:100%;
  padding:20px;
  background:#111827;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#60a5fa;
}

.status{
  background:#16a34a;
  padding:8px 15px;
  border-radius:999px;
  font-size:14px;
}

.container{
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.stat-card{
  background:#1e293b;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.stat-title{
  color:#94a3b8;
  margin-bottom:10px;
}

.stat-value{
  font-size:36px;
  font-weight:bold;
}

.panel{
  background:#111827;
  border-radius:20px;
  padding:25px;
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.panel h2{
  margin-bottom:20px;
  color:#60a5fa;
}

.login-box{
  width:100%;
  max-width:420px;
  margin:80px auto;
  background:#111827;
  padding:40px;
  border-radius:24px;
</html>
