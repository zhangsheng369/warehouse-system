<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业版仓库系统</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f172a;
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}

.header{
  width:100%;
  padding:20px;
  background:#111827;
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  font-size:32px;
  font-weight:bold;
  color:#60a5fa;
}

.status{
  background:#16a34a;
  padding:10px 18px;
  border-radius:999px;
  font-size:14px;
}

.container{
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.stat-card{
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.stat-title{
  color:#94a3b8;
  margin-bottom:10px;
  font-size:15px;
}

.stat-value{
  font-size:42px;
  font-weight:bold;
}

.panel{
  background:#111827;
  border-radius:24px;
  padding:25px;
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.panel h2{
  margin-bottom:20px;
  color:#60a5fa;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
}

input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
  font-size:15px;
}

button{
  background:#2563eb;
  color:white;
  border:none;
  padding:14px 20px;
  border-radius:14px;
  cursor:pointer;
  font-size:15px;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

.card{
  background:#1e293b;
  padding:18px;
  border-radius:18px;
  margin-bottom:15px;
  border-left:6px solid #3b82f6;
}

.card h3{
  margin-bottom:10px;
}

.card p{
  margin-top:5px;
}

.low{
  color:#ef4444;
  font-weight:bold;
}

#ocrResult{
  margin-top:20px;
  background:#020617;
  padding:15px;
  border-radius:12px;
  overflow:auto;
}

@media(max-width:768px){
  .logo{
    font-size:24px;
  }

  .stat-value{
    font-size:32px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">企业版仓库系统</div>
  <div class="status">系统在线运行中</div>
</div>

<div class="container">

  <div class="grid">

    <div class="stat-card">
      <div class="stat-title">库存物料数量</div>
      <div class="stat-value" id="totalItems">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">低库存预警</div>
      <div class="stat-value" id="lowStock">0</div>
    </div>

    <div class="stat-card">
      <div class="stat-title">操作日志数量</div>
      <div class="stat-value" id="logCount">0</div>
    </div>

  </div>


  <div class="panel">
    <h2>OCR智能领料识别</h2>

    <div class="form-grid">
      <input type="file" id="ocrImage" accept="image/*" capture="environment">
      <button onclick="uploadOCR()">上传领料单</button>
    </div>

    <pre id="ocrResult"></pre>
  </div>


  <div class="panel">

    <h2>新增库存</h2>

    <div class="form-grid">
      <input id="model" placeholder="型号">
      <input id="name" placeholder="名称">
      <input id="category" placeholder="分类">
      <input id="stock" type="number" placeholder="库存">
      <input id="min" type="number" placeholder="最低库存">
      <button onclick="addItem()">新增库存</button>
    </div>

  </div>


  <div class="panel">
    <h2>库存列表</h2>
    <div id="list"></div>
  </div>


  <div class="panel">
    <h2>操作日志</h2>
    <div id="logs"></div>
  </div>

</div>


<script>

let token = localStorage.getItem('token') || '';

window.onload = async ()=>{

  if(token){
    await loadItems();
    await loadLogs();
    await updateStats();
  }else{
    login();
  }

}


async function login(){

  try{

    const res = await fetch('/api/login',{
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body:JSON.stringify({
        username:'admin',
        password:'123456'
      })
    });

    const data = await res.json();

    if(data.token){
      token = data.token;
      localStorage.setItem('token',token);

      await loadItems();
      await loadLogs();
      await updateStats();
    }

  }catch(err){
    console.log(err);
  }
}


async function updateStats(){

  try{

    const itemRes = await fetch('/api/items',{
      headers:{ authorization:token }
    });

    const itemData = await itemRes.json();

    const items = itemData.items || itemData || [];

    const logRes = await fetch('/api/logs',{
      headers:{ authorization:token }
    });

    const logData = await logRes.json();

    const logs = logData.logs || logData || [];

    document.getElementById('totalItems').innerText = items.length;

    document.getElementById('lowStock').innerText =
      items.filter(i=>Number(i.stock) < Number(i.min)).length;

    document.getElementById('logCount').innerText = logs.length;

  }catch(err){
    console.log(err);
  }
}


async function loadItems(){

  try{

    const res = await fetch('/api/items',{
      headers:{ authorization:token }
    });

    const data = await res.json();

    const items = data.items || data || [];

    const list = document.getElementById('list');

    list.innerHTML='';

    if(items.length===0){
      list.innerHTML = '<p>暂无库存数据</p>';
      return;
    }

    items.forEach(i=>{

      const low = Number(i.stock) < Number(i.min);

      list.innerHTML += `
        <div class="card">
          <h3>${i.name || '未命名物料'}</h3>
          <p>型号：${i.model || '-'}</p>
          <p>分类：${i.category || '-'}</p>
          <p class="${low ? 'low' : ''}">
            当前库存：${i.stock || 0}
          </p>
          ${low ? '<p class="low">⚠ 库存不足</p>' : ''}
        </div>
      `;

    });

  }catch(err){
    console.log(err);
  }
}


async function addItem(){

  try{

    await fetch('/api/add',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        authorization:token
      },
      body:JSON.stringify({
        model:document.getElementById('model').value,
        name:document.getElementById('name').value,
        category:document.getElementById('category').value,
        stock:Number(document.getElementById('stock').value),
        min:Number(document.getElementById('min').value)
      })
    });

    alert('新增成功');

    document.getElementById('model').value='';
    document.getElementById('name').value='';
    document.getElementById('category').value='';
    document.getElementById('stock').value='';
    document.getElementById('min').value='';

    await loadItems();
    await loadLogs();
    await updateStats();

  }catch(err){
    console.log(err);
  }
}


async function loadLogs(){

  try{

    const res = await fetch('/api/logs',{
      headers:{ authorization:token }
    });

    const data = await res.json();

    const logs = data.logs || data || [];

    const div = document.getElementById('logs');

    div.innerHTML='';

    if(logs.length===0){
      div.innerHTML = '<p>暂无日志</p>';
      return;
    }

    logs.reverse().forEach(l=>{

      div.innerHTML += `
        <div class="card">
          <p><strong>时间：</strong>${l.time || '-'}</p>
          <p><strong>用户：</strong>${l.user || 'admin'}</p>
          <p><strong>操作：</strong>${l.action || '-'}</p>
          <p><strong>型号：</strong>${l.model || '-'}</p>
        </div>
      `;

    });

  }catch(err){
    console.log(err);
  }
}


async function uploadOCR(){

  try{

    const fileInput = document.getElementById('ocrImage');

    if(!fileInput.files[0]){
      alert('请选择图片');
      return;
    }

    const formData = new FormData();

    formData.append('image', fileInput.files[0]);

    const res = await fetch('/api/ocr-upload',{
      method:'POST',
      body:formData
    });

    const data = await res.json();

    document.getElementById('ocrResult').innerText =
      JSON.stringify(data,null,2);

    alert('OCR识别完成');

  }catch(err){
    console.log(err);
  }
}

</script>

</body>
</html>
