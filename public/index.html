<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业版仓库系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f172a;color:white;font-family:Arial;}
.header{background:#111827;padding:20px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:42px;font-weight:bold;color:#60a5fa;}
.status{background:#16a34a;padding:10px 20px;border-radius:999px;}
.container{max-width:1400px;margin:auto;padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:25px;}
.stat-card{background:#1e293b;padding:25px;border-radius:20px;}
.stat-title{color:#94a3b8;margin-bottom:10px;}
.stat-value{font-size:60px;font-weight:bold;}
.panel{background:#111827;padding:25px;border-radius:20px;margin-bottom:25px;}
.panel h2{margin-bottom:20px;color:#60a5fa;}
input{width:100%;padding:16px;border:none;border-radius:12px;background:#1e293b;color:white;margin-bottom:10px;}
button{border:none;background:#2563eb;color:white;padding:16px;border-radius:12px;cursor:pointer;font-size:16px;margin-top:10px;}
.card{background:#1e293b;padding:20px;border-radius:16px;margin-top:15px;}
.low{color:#ef4444;font-weight:bold;}
pre{background:black;padding:15px;border-radius:10px;overflow:auto;margin-top:15px;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">企业版仓库系统</div>
  <div class="status">系统在线运行中</div>
</div>

<div class="container">

  <div class="grid">
    <div class="stat-card">
      <div class="stat-title">库存物料数量</div>
      <div class="stat-value" id="totalCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">低库存预警</div>
      <div class="stat-value" id="lowCount">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-title">操作日志数量</div>
      <div class="stat-value" id="logCount">0</div>
    </div>
  </div>

  <div class="panel">
    <h2>新增库存</h2>
    <input id="model" placeholder="型号">
    <input id="name" placeholder="名称">
    <input id="category" placeholder="分类">
    <input id="stock" type="number" placeholder="库存">
    <input id="min" type="number" placeholder="最低库存">
    <button onclick="addItem()">新增库存</button>
  </div>

  <div class="panel">
    <h2>库存列表</h2>
    <div id="list"></div>
  </div>

  <div class="panel">
    <h2>操作日志</h2>
    <div id="logs"></div>
  </div>

</div>

<script>
async function loadItems(){
  const res = await fetch('/api/items');
  const items = await res.json();
  const list = document.getElementById('list');
  list.innerHTML = '';
  let lowCount = 0;
  items.forEach(i=>{
    if(i.stock < i.min) lowCount++;
    list.innerHTML += `
      <div class="card">
        <h3>${i.name}</h3>
        <p>型号：${i.model}</p>
        <p>分类：${i.category}</p>
        <p class="${i.stock < i.min?'low':''}">库存：${i.stock}</p>
      </div>
    `;
  });
  document.getElementById('totalCount').innerText = items.length;
  document.getElementById('lowCount').innerText = lowCount;
}

async function addItem(){
  const res = await fetch('/api/add',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:model.value,
      name:name.value,
      category:category.value,
      stock:Number(stock.value),
      min:Number(min.value)
    })
  });
  alert('新增成功');
  loadItems();
  loadLogs();
}

async function loadLogs(){
  const res = await fetch('/api/logs');
  const logs = await res.json();
  const div = document.getElementById('logs');
  div.innerHTML = '';
  logs.reverse().forEach(l=>{
    div.innerHTML += `
      <div class="card">
        <p>${l.time}</p>
        <p>${l.user}</p>
        <p>${l.action}</p>
        <p>${l.model}</p>
      </div>
    `;
  });
  document.getElementById('logCount').innerText = logs.length;
}

loadItems();
loadLogs();
</script>

</body>
</html>
